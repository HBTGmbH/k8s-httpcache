version: "2"

formatters:
  enable:
    - gofumpt

linters:
  default: standard  # govet, staticcheck, ineffassign, unused (made explicit)
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - decorder
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - err113
    - embeddedstructfieldcheck
    - errcheck
    - errchkjson
    - errorlint
    - errname
    - exhaustive
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funcorder
    - gochecknoinits
    - gocheckcompilerdirectives
    - gochecksumtype
    - goconst
    - gocritic
    - godoclint
    - godot
    - godox
    - gomoddirectives
    - goprintffuncname
    - gosmopolitan
    - grouper
    - gosec
    - iface
    - importas
    - inamedparam
    - interfacebloat
    - intrange
    - iotamixing
    - ireturn
    - loggercheck
    - makezero
    - mirror
    - misspell
    - musttag
    - modernize
    - nakedret
    - nestif
    - nilerr
    - nlreturn
    - noinlineerr
    - noctx
    - nilnesserr
    - nilnil
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - reassign
    - recvcheck
    - revive
    - sloglint
    - tagalign
    - tagliatelle
    - testableexamples
    - thelper
    - tparallel
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
    - wrapcheck
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment  # too noisy; micro-optimization not worth readability cost
        - shadow          # mostly flags idiomatic err re-declarations
        - findcall        # demo analyzer, not useful
    iface:
      enable:
        - identical
        - opaque
        - unused
        - unexported
    sloglint:
      static-msg: true
      key-naming-case: snake
    errcheck:
      check-type-assertions: true
    staticcheck:
      checks: ["all"]
    forbidigo:
      forbid:
        - pattern: 'fmt\.Print(ln|f)?'
          msg: use slog for structured logging
        - pattern: '^print(ln)?$'
          msg: use slog for structured logging
    gocritic:
      enable-all: true
      disabled-checks:
        - unnamedResult  # conflicts with nonamedreturns linter
    exhaustive:
      default-signifies-exhaustive: true
    gosec:
      excludes:
        - G104  # redundant with errcheck
        - G204  # subprocess launch is core functionality
        - G304  # file reading by variable path is core functionality
    nolintlint:
      require-explanation: true
      require-specific: true
    copyloopvar:
      check-alias: true
    embeddedstructfieldcheck:
      forbid-mutex: true         # embedded mutexes leak lock/unlock into the API surface
    errchkjson:
      check-error-free-encoding: true
    fatcontext:
      check-struct-pointers: true
    nonamedreturns:
      report-error-in-defer: true
    perfsprint:
      err-error: true            # prefer err.Error() over fmt.Sprintf("%s", err)
    usestdlibvars:
      time-weekday: true
      time-month: true
      time-layout: true
      crypto-hash: true
    usetesting:
      context-background: true   # use t.Context() instead of context.Background()
      context-todo: true         # use t.Context() instead of context.TODO()
      os-temp-dir: true          # use t.TempDir() instead of os.TempDir()
    revive:
      enable-all-rules: true
      rules:
        - name: confusing-results
          disabled: true
        - name: add-constant
          disabled: true
        - name: argument-limit
          disabled: true
        - name: cognitive-complexity
          disabled: true
        - name: comments-density
          disabled: true
        - name: cyclomatic
          disabled: true
        - name: file-header
          disabled: true
        - name: file-length-limit
          disabled: true
        - name: flag-parameter
          disabled: true
        - name: function-length
          disabled: true
        - name: function-result-limit
          disabled: true
        - name: line-length-limit
          disabled: true
        - name: max-control-nesting
          disabled: true
        - name: max-public-structs
          disabled: true
        - name: modifies-parameter
          disabled: true
        - name: banned-characters
          disabled: true
        - name: imports-blocklist
          disabled: true
        - name: string-format
          disabled: true
        - name: confusing-naming
          disabled: true
        - name: deep-exit
          disabled: true
        - name: enforce-switch-style
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - revive
        text: context-as-argument
      - path: _test\.go
        linters:
          - dupl
          - err113
          - goconst
          - ireturn
          - noctx
      - path: _test\.go
        linters:
          - gosec
        text: G115|G302|G306|G703
