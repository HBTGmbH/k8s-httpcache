version: "2"

formatters:
  enable:
    - gofumpt

linters:
  default: standard  # govet, staticcheck, ineffassign, unused (made explicit)
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - decorder
    - depguard
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - err113
    - embeddedstructfieldcheck
    - errcheck
    - errchkjson
    - errorlint
    - errname
    - exhaustive
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funcorder
    - gochecknoinits
    - gocheckcompilerdirectives
    - gochecksumtype
    - goconst
    - gocritic
    - godoclint
    - godot
    - godox
    - gomoddirectives
    - goprintffuncname
    - gosmopolitan
    - grouper
    - gosec
    - iface
    - importas
    - inamedparam
    - interfacebloat
    - intrange
    - iotamixing
    - ireturn
    - loggercheck
    - makezero
    - mirror
    - misspell
    - musttag
    - modernize
    - nakedret
    - nestif
    - nilerr
    - nlreturn
    - noinlineerr
    - noctx
    - nilnesserr
    - nilnil
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - reassign
    - recvcheck
    - revive
    - sloglint
    - tagalign
    - tagliatelle
    - testableexamples
    - thelper
    - tparallel
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
    - wrapcheck
  settings:
    depguard:
      rules:
        # Ban discouraged packages everywhere. The repo imports none of these today;
        # this only prevents regressions. math/rand is intentionally NOT banned here:
        # depguard prefix-matching would also flag the legitimate math/rand/v2, and
        # weak-randomness misuse is already covered by gosec G404.
        discouraged:
          deny:
            - pkg: io/ioutil
              desc: deprecated; use io and os
            - pkg: github.com/pkg/errors
              desc: use the stdlib errors package with %w
            - pkg: gopkg.in/yaml.v2
              desc: use sigs.k8s.io/yaml
            - pkg: github.com/gogo/protobuf
              desc: unmaintained; use google.golang.org/protobuf
        # Lock the internal/* dependency DAG: a new cross-package edge must be a
        # conscious edit here, not silent architectural drift. Leaf packages
        # (config, redact, telemetry, watcher) import no sibling internal package.
        leaf-packages:
          files:
            - '**/internal/config/**'
            - '**/internal/redact/**'
            - '**/internal/telemetry/**'
            - '**/internal/watcher/**'
          deny:
            - pkg: k8s-httpcache/internal
              desc: leaf packages must not import sibling internal packages
        # renderer may import only internal/watcher.
        renderer:
          files:
            - '**/internal/renderer/**'
          deny:
            - pkg: k8s-httpcache/internal/broadcast
              desc: renderer may import only internal/watcher
            - pkg: k8s-httpcache/internal/config
              desc: renderer may import only internal/watcher
            - pkg: k8s-httpcache/internal/redact
              desc: renderer may import only internal/watcher
            - pkg: k8s-httpcache/internal/telemetry
              desc: renderer may import only internal/watcher
            - pkg: k8s-httpcache/internal/varnish
              desc: renderer may import only internal/watcher
        # varnish may import only internal/redact and internal/telemetry.
        varnish:
          files:
            - '**/internal/varnish/**'
          deny:
            - pkg: k8s-httpcache/internal/broadcast
              desc: varnish may import only internal/redact and internal/telemetry
            - pkg: k8s-httpcache/internal/config
              desc: varnish may import only internal/redact and internal/telemetry
            - pkg: k8s-httpcache/internal/renderer
              desc: varnish may import only internal/redact and internal/telemetry
            - pkg: k8s-httpcache/internal/watcher
              desc: varnish may import only internal/redact and internal/telemetry
        # broadcast may import only internal/telemetry and internal/watcher.
        broadcast:
          files:
            - '**/internal/broadcast/**'
          deny:
            - pkg: k8s-httpcache/internal/config
              desc: broadcast may import only internal/telemetry and internal/watcher
            - pkg: k8s-httpcache/internal/redact
              desc: broadcast may import only internal/telemetry and internal/watcher
            - pkg: k8s-httpcache/internal/renderer
              desc: broadcast may import only internal/telemetry and internal/watcher
            - pkg: k8s-httpcache/internal/varnish
              desc: broadcast may import only internal/telemetry and internal/watcher
    govet:
      enable-all: true
      disable:
        - fieldalignment  # too noisy; micro-optimization not worth readability cost
        - findcall        # demo analyzer, not useful
    ireturn:
      allow:
        - anon
        - error
        - empty
        - stdlib
        - proc  # unexported DI seam for testing
    iface:
      enable:
        - identical
        - opaque
        - unused
        - unexported
    sloglint:
      static-msg: true
      key-naming-case: snake
    errcheck:
      check-type-assertions: true
    staticcheck:
      checks: ["all"]
    forbidigo:
      forbid:
        - pattern: 'fmt\.Print(ln|f)?'
          msg: use slog for structured logging
        - pattern: '^print(ln)?$'
          msg: use slog for structured logging
    godoclint:
      enable:
        - no-unused-link
        - require-stdlib-doclink
    predeclared:
      qualified-name: true
    gocritic:
      enable-all: true
      disabled-checks:
        - unnamedResult  # conflicts with nonamedreturns linter
    exhaustive:
      default-signifies-exhaustive: true
    loggercheck:
      kitlog: false
      zap: false
      require-string-key: true
      no-printf-like: true
    gosec:
      excludes:
        - G104  # redundant with errcheck
        - G204  # subprocess launch is core functionality
        - G304  # file reading by variable path is core functionality
      config:
        global:
          audit: true
    nolintlint:
      require-explanation: true
      require-specific: true
    copyloopvar:
      check-alias: true
    embeddedstructfieldcheck:
      forbid-mutex: true         # embedded mutexes leak lock/unlock into the API surface
    errchkjson:
      check-error-free-encoding: true
    fatcontext:
      check-struct-pointers: true
    nonamedreturns:
      report-error-in-defer: true
    perfsprint:
      err-error: true            # prefer err.Error() over fmt.Sprintf("%s", err)
    usestdlibvars:
      time-weekday: true
      time-month: true
      time-layout: true
      crypto-hash: true
    usetesting:
      context-background: true   # use t.Context() instead of context.Background()
      context-todo: true         # use t.Context() instead of context.TODO()
      os-temp-dir: true          # use t.TempDir() instead of os.TempDir()
    revive:
      enable-all-rules: true
      rules:
        - name: confusing-results
          disabled: true
        - name: add-constant
          disabled: true
        - name: argument-limit
          disabled: true
        - name: cognitive-complexity
          disabled: true
        - name: comments-density
          disabled: true
        - name: cyclomatic
          disabled: true
        - name: file-header
          disabled: true
        - name: file-length-limit
          disabled: true
        - name: flag-parameter
          disabled: true
        - name: function-length
          disabled: true
        - name: function-result-limit
          disabled: true
        - name: line-length-limit
          disabled: true
        - name: max-control-nesting
          disabled: true
        - name: max-public-structs
          disabled: true
        - name: modifies-parameter
          disabled: true
        - name: banned-characters
          disabled: true
        - name: imports-blocklist
          disabled: true
        - name: string-format
          disabled: true
        - name: confusing-naming
          disabled: true
        - name: deep-exit
          disabled: true
        - name: enforce-switch-style
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - revive
        text: context-as-argument
      - path: _test\.go
        linters:
          - dupl
          - err113
          - goconst
          - ireturn
          - noctx
      - path: _test\.go
        linters:
          - gosec
        text: G115|G302|G306|G703
