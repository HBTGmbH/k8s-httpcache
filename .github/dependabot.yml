version: 2
updates:
# Each Varnish major version is tested separately in the CI matrix.
# We treat Varnish 6 differently because we only want its 6.0.x updates,
# not the 6.6.x, which also exists in Docker Hub (but was uploaded more
# than four years ago).
# varnish6: patch-only (6.0.x is the final 6.x minor release)
# varnish7: minor + patch
# varnish8: minor + patch
# varnish9: minor + patch
- package-ecosystem: docker
  directory: /.github/test/varnish6
  schedule:
    interval: weekly
  cooldown:
    default-days: 7  # wait a week before adopting a fresh release (supply-chain hygiene)
  ignore:
  - dependency-name: varnish
    update-types:
    - "version-update:semver-major"
    - "version-update:semver-minor"

- package-ecosystem: docker
  directory: /.github/test/varnish7
  schedule:
    interval: weekly
  cooldown:
    default-days: 7  # wait a week before adopting a fresh release (supply-chain hygiene)
  ignore:
  - dependency-name: varnish
    update-types:
    - "version-update:semver-major"

- package-ecosystem: docker
  directory: /.github/test/varnish8
  schedule:
    interval: weekly
  cooldown:
    default-days: 7  # wait a week before adopting a fresh release (supply-chain hygiene)
  ignore:
  - dependency-name: varnish
    update-types:
    - "version-update:semver-major"

- package-ecosystem: docker
  directory: /.github/test/varnish9
  schedule:
    interval: weekly
  cooldown:
    default-days: 7  # wait a week before adopting a fresh release (supply-chain hygiene)
  ignore:
  - dependency-name: varnish
    update-types:
    - "version-update:semver-major"

- package-ecosystem: gomod
  directory: /
  schedule:
    interval: weekly
  cooldown:
    default-days: 7  # wait a week before adopting a fresh release (supply-chain hygiene)
  groups:
    go-modules:
      patterns:
      - "*"

- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
  cooldown:
    default-days: 7  # wait a week before adopting a fresh release (supply-chain hygiene)
  groups:
    github-actions:
      patterns:
      - "*"

# Pinned markdownlint-cli used by the Markdown lint CI step (see test-and-build.yml).
- package-ecosystem: npm
  directory: /.github/markdownlint
  schedule:
    interval: weekly
  cooldown:
    default-days: 7  # wait a week before adopting a fresh release (supply-chain hygiene)
  groups:
    markdownlint:
      patterns:
      - "*"
