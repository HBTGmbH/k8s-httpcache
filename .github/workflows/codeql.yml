name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    if: >-
      github.event_name != 'push' ||
      (!startsWith(github.event.head_commit.message, 'docs:') &&
      !startsWith(github.event.head_commit.message, 'docs('))
    runs-on: ubuntu-latest
    outputs:
      actions: ${{ steps.filter.outputs.actions }}
      go: ${{ steps.filter.outputs.go }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false
        fetch-depth: 20
    - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
      id: filter
      with:
        filters: |
          actions:
            - '.github/workflows/**'
          go:
            - '**/*.go'
            - 'go.mod'
            - 'go.sum'

  analyze:
    name: Analyze
    needs: [changes]
    if: >-
      !failure() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # upload CodeQL results to code scanning
    strategy:
      fail-fast: false
      matrix:
        language: [actions, go]
    steps:
    - name: Check run condition
      id: should-run
      run: echo "skip=true" >> "$GITHUB_OUTPUT"
      if: >-
        github.event_name != 'schedule' &&
        !(matrix.language == 'actions' && needs.changes.outputs.actions == 'true') &&
        !(matrix.language == 'go' && needs.changes.outputs.go == 'true')
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      if: steps.should-run.outputs.skip != 'true'
      with:
        persist-credentials: false
    - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
      if: steps.should-run.outputs.skip != 'true' && matrix.language == 'go'
      with:
        go-version-file: go.mod
    - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
      if: steps.should-run.outputs.skip != 'true'
      with:
        languages: ${{ matrix.language }}
        # Broader query suite (extra security + maintainability queries) for Go.
        # The 'actions' language stays on its default suite - zizmor and actionlint
        # already cover workflow security in depth.
        queries: ${{ matrix.language == 'go' && 'security-and-quality' || '' }}
    - uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
      if: steps.should-run.outputs.skip != 'true' && matrix.language == 'go'
    - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
      if: steps.should-run.outputs.skip != 'true'
      with:
        category: /language:${{ matrix.language }}
