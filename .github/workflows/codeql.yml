name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  changes:
    if: >-
      github.event_name != 'push' ||
      (!startsWith(github.event.head_commit.message, 'docs:') &&
      !startsWith(github.event.head_commit.message, 'docs('))
    runs-on: ubuntu-latest
    outputs:
      actions: ${{ steps.filter.outputs.actions }}
      go: ${{ steps.filter.outputs.go }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
        fetch-depth: 20
    - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
      id: filter
      with:
        filters: |
          actions:
            - '.github/workflows/**'
          go:
            - '**/*.go'
            - 'go.mod'
            - 'go.sum'

  analyze:
    needs: [changes]
    if: >-
      !failure() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [actions, go]
    steps:
    - name: Check run condition
      id: should-run
      run: echo "skip=true" >> "$GITHUB_OUTPUT"
      if: >-
        github.event_name != 'schedule' &&
        !(matrix.language == 'actions' && needs.changes.outputs.actions == 'true') &&
        !(matrix.language == 'go' && needs.changes.outputs.go == 'true')
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      if: steps.should-run.outputs.skip != 'true'
      with:
        persist-credentials: false
    - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
      if: steps.should-run.outputs.skip != 'true' && matrix.language == 'go'
      with:
        go-version-file: go.mod
    - uses: github/codeql-action/init@b1bff81932f5cdfc8695c7752dcee935dcd061c8  # v4
      if: steps.should-run.outputs.skip != 'true'
      with:
        languages: ${{ matrix.language }}
    - uses: github/codeql-action/autobuild@b1bff81932f5cdfc8695c7752dcee935dcd061c8  # v4
      if: steps.should-run.outputs.skip != 'true' && matrix.language == 'go'
    - uses: github/codeql-action/analyze@b1bff81932f5cdfc8695c7752dcee935dcd061c8  # v4
      if: steps.should-run.outputs.skip != 'true'
      with:
        category: /language:${{ matrix.language }}
