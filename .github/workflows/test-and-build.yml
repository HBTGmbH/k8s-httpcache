name: Test and Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    if: >-
      github.event_name != 'push' ||
      (!startsWith(github.event.head_commit.message, 'docs:') &&
      !startsWith(github.event.head_commit.message, 'docs('))
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      src: ${{ steps.filter.outputs.src }}
      ci: ${{ steps.filter.outputs.ci }}
      md: ${{ steps.filter.outputs.md }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
        fetch-depth: 20
    - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
      id: filter
      with:
        filters: |
          go:
            - '**/*.go'
            - 'go.mod'
            - 'go.sum'
          src:
            - '**/!(*_test).go'
            - 'go.mod'
            - 'go.sum'
          ci:
            - '.github/**'
          md:
            - '**/*.md'
            - '.markdownlint-cli2.yaml'

  unit-test:
    needs: [changes]
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Setup Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # zizmor: ignore[cache-poisoning] v6.3.0
      with:
        go-version-file: go.mod
    - name: Restore gotestsum
      uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
      id: gotestsum
      with:
        path: ~/go/bin/gotestsum
        key: gotestsum-1.13.0-linux-amd64
    - name: Install gotestsum
      if: steps.gotestsum.outputs.cache-hit != 'true'
      run: |
        curl -sfL https://github.com/gotestyourself/gotestsum/releases/download/v1.13.0/gotestsum_1.13.0_linux_amd64.tar.gz \
          | tar -xz -C ~/go/bin gotestsum
    - name: Save gotestsum
      if: steps.gotestsum.outputs.cache-hit != 'true'
      uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
      with:
        path: ~/go/bin/gotestsum
        key: gotestsum-1.13.0-linux-amd64
    - name: Run tests with coverage
      run: gotestsum --junitfile unit-tests.xml --format testdox -- -race -count=1 -coverprofile=coverage.out -coverpkg=./... ./...
    - name: Display coverage
      run: go tool cover -func=coverage.out
    - name: Generate coverage HTML
      if: always()
      run: go tool cover -html=coverage.out -o coverage.html
    - name: Upload test results
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
      if: always()
      with:
        name: unit-test-results
        path: |
          unit-tests.xml
          coverage.out
          coverage.html

  lint:
    needs: [changes]
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      needs.changes.outputs.md == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Setup Go
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true'
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # zizmor: ignore[cache-poisoning] v6.3.0
      with:
        go-version-file: go.mod
    - name: Go Lint
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true'
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
    - name: Restore analysis tools
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true'
      uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
      id: analysis-tools
      with:
        path: |
          ~/go/bin/govulncheck
          ~/go/bin/deadcode
        key: analysis-tools-govulncheck-1.1.4-deadcode-0.42.0
    - name: Install analysis tools
      if: >-
        (startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true') &&
        steps.analysis-tools.outputs.cache-hit != 'true'
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
        go install golang.org/x/tools/cmd/deadcode@v0.42.0
    - name: Save analysis tools
      if: >-
        (startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true') &&
        steps.analysis-tools.outputs.cache-hit != 'true'
      uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
      with:
        path: |
          ~/go/bin/govulncheck
          ~/go/bin/deadcode
        key: analysis-tools-govulncheck-1.1.4-deadcode-0.42.0
    - name: Run govulncheck
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true'
      run: govulncheck ./...
    - name: Run deadcode
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true'
      run: deadcode -test ./...
    - name: ShellCheck
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.ci == 'true'
      run: shellcheck .github/test/*.sh
    - name: YAML lint
      run: yamllint --strict .
    - name: Restore markdownlint-cli2
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.md == 'true' ||
        needs.changes.outputs.ci == 'true'
      uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
      id: markdownlint
      with:
        path: ~/markdownlint
        key: markdownlint-cli2-0.21.0
    - name: Install markdownlint-cli2
      if: >-
        (startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.md == 'true' ||
        needs.changes.outputs.ci == 'true') &&
        steps.markdownlint.outputs.cache-hit != 'true'
      run: npm install --prefix ~/markdownlint markdownlint-cli2@0.21.0
    - name: Save markdownlint-cli2
      if: >-
        (startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.md == 'true' ||
        needs.changes.outputs.ci == 'true') &&
        steps.markdownlint.outputs.cache-hit != 'true'
      uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
      with:
        path: ~/markdownlint
        key: markdownlint-cli2-0.21.0
    - name: Markdown lint
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.md == 'true' ||
        needs.changes.outputs.ci == 'true'
      run: ~/markdownlint/node_modules/.bin/markdownlint-cli2 "**/*.md"


  go-build:
    needs: [changes]
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.src == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Determine version
      id: version
      run: |
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
        else
          echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
        fi
    - name: Cache binaries
      id: cache
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # zizmor: ignore[cache-poisoning] v5.0.4
      with:
        path: k8s-httpcache-linux-*
        key: binaries-${{ steps.version.outputs.value }}-${{ hashFiles('**/*.go', 'go.mod', 'go.sum') }}
    - name: Setup Go
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # zizmor: ignore[cache-poisoning] v6.3.0
      with:
        go-version-file: go.mod
    - name: Build binaries
      if: steps.cache.outputs.cache-hit != 'true'
      env:
        VERSION: ${{ steps.version.outputs.value }}
      run: |
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath \
          -ldflags "-s -w -X main.version=${VERSION} -extldflags \"-static\" -buildid=" \
          -o k8s-httpcache-linux-amd64 . &
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath \
          -ldflags "-s -w -X main.version=${VERSION} -extldflags \"-static\" -buildid=" \
          -o k8s-httpcache-linux-arm64 . &
        fail=0
        for pid in $(jobs -p); do wait "$pid" || fail=1; done
        exit $fail
    - name: Upload binaries
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
      with:
        name: binaries
        path: k8s-httpcache-linux-*

  test:
    needs: [changes, unit-test, lint, go-build]
    if: >-
      !failure() && !cancelled() &&
      (startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.src == 'true' ||
      needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - varnish6/Dockerfile
          - varnish7/Dockerfile
          - varnish8/Dockerfile
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Download binaries
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: binaries
    - name: Restore test tools
      uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
      id: test-tools
      with:
        path: ~/tools
        key: test-tools-hurl-7.1.0-oha-1.13.0
    - name: Install tools
      if: steps.test-tools.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/tools
        curl -sfL -o /tmp/hurl.deb https://github.com/Orange-OpenSource/hurl/releases/download/7.1.0/hurl_7.1.0_amd64.deb
        dpkg-deb -x /tmp/hurl.deb /tmp/hurl
        cp /tmp/hurl/usr/bin/* ~/tools/
        curl -sfL -o ~/tools/oha https://github.com/hatoo/oha/releases/download/v1.13.0/oha-linux-amd64
        chmod +x ~/tools/oha
    - name: Save test tools
      if: steps.test-tools.outputs.cache-hit != 'true'
      uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
      with:
        path: ~/tools
        key: test-tools-hurl-7.1.0-oha-1.13.0
    - name: Add tools to PATH
      run: echo "$HOME/tools" >> "$GITHUB_PATH"
    - name: Build test image
      run: |
        mkdir .docker-context
        cp k8s-httpcache-linux-amd64 .docker-context/
        docker build -f .github/test/${{ matrix.dockerfile }} \
          --build-arg BINARY=k8s-httpcache-linux-amd64 \
          -t localhost/k8s-httpcache:test .docker-context
    - name: Create kind cluster
      uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
      with:
        cluster_name: test
        config: .github/test/kind-config.yaml
    - name: Install ingress-nginx
      run: |
        kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml > /dev/null
        kubectl wait -n ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=120s > /dev/null
        kubectl patch configmap -n ingress-nginx ingress-nginx-controller --type merge -p '{"data":{"upstream-keepalive-timeout":"5"}}' > /dev/null
    - name: Load image into kind
      run: kind load docker-image localhost/k8s-httpcache:test --name test -q
    - name: Deploy
      run: kubectl apply -f .github/test/manifest.yaml > /dev/null
    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/backend --timeout=120s
        kubectl rollout status -n test-ns deployment/backend-xns --timeout=120s
        kubectl rollout status deployment/k8s-httpcache --timeout=120s
    - name: Debug rollout failure
      if: failure()
      run: |
        kubectl get pods -A -o wide
        kubectl get events --sort-by='.lastTimestamp' --field-selector reason!=Pulled
        kubectl get events -n test-ns --sort-by='.lastTimestamp' --field-selector reason!=Pulled
        for pod in $(kubectl get pods -l app=k8s-httpcache -o name); do
          echo "--- $pod ---"
          kubectl describe "$pod"
          kubectl logs "$pod" --tail=50
        done
    - name: Smoke test
      run: .github/test/smoke-test.sh --report-junit smoke-report.xml
    - name: Metrics and broadcast smoke test
      run: .github/test/metrics-test.sh
    - name: Debounce test
      run: .github/test/debounce-test.sh
    - name: Shard Distribution test
      run: .github/test/shard-test.sh
    - name: Values update test
      run: .github/test/values-update-test.sh
    - name: Values-dir update test
      run: .github/test/values-dir-update-test.sh
    - name: VCL update test
      run: .github/test/vcl-update-test.sh
    - name: File-watch disable test
      run: .github/test/file-watch-disable-test.sh
    - name: Drain sessions test
      run: .github/test/drain-sessions-test.sh
    - name: Graceful drain test
      run: .github/test/drain-test.sh
    - name: Topology-aware routing test
      run: .github/test/topology-test.sh
    - name: Zero-downtime rollout restart
      run: .github/test/rollout-test.sh
    - name: Upload E2E test results
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
      if: always()
      with:
        name: e2e-test-results-${{ strategy.job-index }}
        path: |
          smoke-report.xml
          /tmp/oha.json
    - name: Show pod status on failure
      if: failure()
      run: |
        kubectl get pods -A -o wide
        kubectl describe pods -l app=k8s-httpcache
        kubectl logs -l app=k8s-httpcache --tail=50
        kubectl logs -l app=backend --tail=50
        kubectl logs -n test-ns -l app=backend-xns --tail=50

  build:
    needs: [changes, test]
    if: >-
      github.event_name != 'pull_request' &&
      !failure() && !cancelled() &&
      (startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.src == 'true' ||
      needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Download binaries
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: binaries
    - name: Prepare Docker context
      run: |
        mkdir .docker-context
        cp k8s-httpcache-linux-* .docker-context/
    - name: Setup BuildKit
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0
    - name: Docker Login
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
      if: github.event_name != 'pull_request'
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Extract Metadata
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
      id: meta
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
    - name: Docker push
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
      with:
        context: .docker-context
        file: .github/build/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Download binaries
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: binaries
    - name: Create checksums
      run: sha256sum k8s-httpcache-linux-* > checksums.txt
    - name: Create or upload release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ github.ref_name }}
      run: |
        if gh release view "$TAG" > /dev/null 2>&1; then
          gh release upload "$TAG" \
            k8s-httpcache-linux-amd64 \
            k8s-httpcache-linux-arm64 \
            checksums.txt \
            --clobber
        else
          gh release create "$TAG" \
            k8s-httpcache-linux-amd64 \
            k8s-httpcache-linux-arm64 \
            checksums.txt \
            --generate-notes
        fi
