name: Test and Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    if: >-
      github.event_name != 'push' ||
      (!startsWith(github.event.head_commit.message, 'docs:') &&
      !startsWith(github.event.head_commit.message, 'docs('))
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      gofiles: ${{ steps.filter.outputs.gofiles }}
      src: ${{ steps.filter.outputs.src }}
      ci: ${{ steps.filter.outputs.ci }}
      helm: ${{ steps.filter.outputs.helm }}
      yaml: ${{ steps.filter.outputs.yaml }}
      md: ${{ steps.filter.outputs.md }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false
        fetch-depth: 20
    - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
      id: filter
      with:
        filters: |
          go:
            - '**/*.go'
            - 'go.mod'
            - 'go.sum'
            - '.golangci.yml'
            - '.testcoverage.yml'
          gofiles:
            - '**/*.go'
          src:
            - '**/!(*_test).go'
            - 'go.mod'
            - 'go.sum'
          ci:
            - '.github/**'
          helm:
            - 'charts/**'
          yaml:
            - '**/*.yaml'
            - '**/*.yml'
          md:
            - '**/*.md'
            - '.markdownlint.yaml'
            - '.markdownlintignore'

  unit-test:
    name: Unit test
    needs: [changes]
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false
    - name: Setup Go
      # zizmor: ignore[cache-poisoning]
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
      with:
        go-version-file: go.mod
    - name: Restore gotestsum
      uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      id: gotestsum
      with:
        path: ~/go/bin/gotestsum
        key: gotestsum-1.13.0-linux-amd64
    - name: Install gotestsum
      if: steps.gotestsum.outputs.cache-hit != 'true'
      run: |
        curl -sfL https://github.com/gotestyourself/gotestsum/releases/download/v1.13.0/gotestsum_1.13.0_linux_amd64.tar.gz \
          | tar -xz -C ~/go/bin gotestsum
    - name: Save gotestsum
      if: steps.gotestsum.outputs.cache-hit != 'true'
      uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      with:
        path: ~/go/bin/gotestsum
        key: gotestsum-1.13.0-linux-amd64
    - name: Restore go-test-coverage
      uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      id: go-test-coverage
      with:
        path: ~/go/bin/go-test-coverage
        key: go-test-coverage-2.18.8
    - name: Install go-test-coverage
      if: steps.go-test-coverage.outputs.cache-hit != 'true'
      run: go install github.com/vladopajic/go-test-coverage/v2@v2.18.8
    - name: Save go-test-coverage
      if: steps.go-test-coverage.outputs.cache-hit != 'true'
      uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      with:
        path: ~/go/bin/go-test-coverage
        key: go-test-coverage-2.18.8
    - name: Run tests with coverage
      run: gotestsum --junitfile unit-tests.xml --format testdox -- -race -count=1 -coverprofile=coverage.out -coverpkg=./... ./...
    - name: Display coverage
      run: go tool cover -func=coverage.out
    - name: Coverage gate
      run: go-test-coverage --config=.testcoverage.yml
    - name: Generate coverage HTML
      if: always()
      run: go tool cover -html=coverage.out -o coverage.html
    - name: Upload test results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      if: always()
      with:
        name: unit-test-results
        path: |
          unit-tests.xml
          coverage.out
          coverage.html

  lint:
    name: Lint
    needs: [changes]
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      needs.changes.outputs.helm == 'true' ||
      needs.changes.outputs.yaml == 'true' ||
      needs.changes.outputs.md == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false
    - name: Setup Go
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true'
      # zizmor: ignore[cache-poisoning]
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
      with:
        go-version-file: go.mod
    - name: Go Lint
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true'
      uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9.2.1
      with:
        version: v2.12.2
    - name: Restore analysis tools
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true'
      uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      id: analysis-tools
      with:
        path: |
          ~/go/bin/govulncheck
          ~/go/bin/deadcode
        key: analysis-tools-govulncheck-1.4.0-deadcode-0.46.0
    - name: Install analysis tools
      if: >-
        (startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true') &&
        steps.analysis-tools.outputs.cache-hit != 'true'
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@v1.4.0
        go install golang.org/x/tools/cmd/deadcode@v0.46.0
    - name: Save analysis tools
      if: >-
        (startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true') &&
        steps.analysis-tools.outputs.cache-hit != 'true'
      uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      with:
        path: |
          ~/go/bin/govulncheck
          ~/go/bin/deadcode
        key: analysis-tools-govulncheck-1.4.0-deadcode-0.46.0
    - name: Run govulncheck
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true'
      run: govulncheck ./...
    - name: Run deadcode
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.gofiles == 'true' ||
        needs.changes.outputs.ci == 'true'
      # deadcode prints findings to stdout but always exits 0, so fail explicitly
      # when it reports anything.
      run: |
        output=$(deadcode -test ./...)
        if [ -n "$output" ]; then
          echo "$output"
          echo "::error::deadcode found unreachable code"
          exit 1
        fi
    - name: ShellCheck
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.ci == 'true'
      run: shellcheck .github/test/*.sh
    - name: Restore actionlint
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.ci == 'true'
      uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      id: actionlint
      with:
        path: ~/tools/actionlint
        key: actionlint-1.7.12-linux-amd64
    - name: Install actionlint
      if: >-
        (startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.ci == 'true') &&
        steps.actionlint.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/tools
        curl -sfL https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz \
          | tar -xz -C ~/tools actionlint
        chmod +x ~/tools/actionlint
    - name: Save actionlint
      if: >-
        (startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.ci == 'true') &&
        steps.actionlint.outputs.cache-hit != 'true'
      uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      with:
        path: ~/tools/actionlint
        key: actionlint-1.7.12-linux-amd64
    - name: Actionlint
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.ci == 'true'
      run: ~/tools/actionlint -color
    - name: Install yamllint
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.yaml == 'true' ||
        needs.changes.outputs.ci == 'true'
      run: python3 -m pip install --user yamllint==1.38.0
    - name: YAML lint
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.yaml == 'true' ||
        needs.changes.outputs.ci == 'true'
      run: yamllint --strict .
    - name: Restore markdownlint-cli
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.md == 'true' ||
        needs.changes.outputs.ci == 'true'
      uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      id: markdownlint
      with:
        path: .github/markdownlint/node_modules
        key: markdownlint-cli-${{ hashFiles('.github/markdownlint/package-lock.json') }}
    - name: Install markdownlint-cli
      if: >-
        (startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.md == 'true' ||
        needs.changes.outputs.ci == 'true') &&
        steps.markdownlint.outputs.cache-hit != 'true'
      working-directory: .github/markdownlint
      run: npm ci
    - name: Save markdownlint-cli
      if: >-
        (startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.md == 'true' ||
        needs.changes.outputs.ci == 'true') &&
        steps.markdownlint.outputs.cache-hit != 'true'
      uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      with:
        path: .github/markdownlint/node_modules
        key: markdownlint-cli-${{ hashFiles('.github/markdownlint/package-lock.json') }}
    - name: Markdown lint
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.md == 'true' ||
        needs.changes.outputs.ci == 'true'
      run: .github/markdownlint/node_modules/.bin/markdownlint --config .markdownlint.yaml "**/*.md"
    - name: Restore hadolint
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.ci == 'true'
      uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      id: hadolint
      with:
        path: ~/tools/hadolint
        key: hadolint-2.14.0-linux-amd64
    - name: Install hadolint
      if: >-
        (startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.ci == 'true') &&
        steps.hadolint.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/tools
        curl -sfL -o ~/tools/hadolint https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-linux-x86_64
        chmod +x ~/tools/hadolint
    - name: Save hadolint
      if: >-
        (startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.ci == 'true') &&
        steps.hadolint.outputs.cache-hit != 'true'
      uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      with:
        path: ~/tools/hadolint
        key: hadolint-2.14.0-linux-amd64
    - name: Hadolint
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.ci == 'true'
      run: ~/tools/hadolint .github/build/Dockerfile .github/test/*/Dockerfile
    - name: Helm lint
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.helm == 'true' ||
        needs.changes.outputs.ci == 'true'
      run: helm lint --strict charts/k8s-httpcache
    - name: Restore kubeconform
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.helm == 'true' ||
        needs.changes.outputs.yaml == 'true' ||
        needs.changes.outputs.ci == 'true'
      uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      id: kubeconform
      with:
        path: ~/tools/kubeconform
        key: kubeconform-0.8.0-linux-amd64
    - name: Install kubeconform
      if: >-
        (startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.helm == 'true' ||
        needs.changes.outputs.yaml == 'true' ||
        needs.changes.outputs.ci == 'true') &&
        steps.kubeconform.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/tools
        curl -sfL https://github.com/yannh/kubeconform/releases/download/v0.8.0/kubeconform-linux-amd64.tar.gz \
          | tar -xz -C ~/tools kubeconform
        chmod +x ~/tools/kubeconform
    - name: Save kubeconform
      if: >-
        (startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.helm == 'true' ||
        needs.changes.outputs.yaml == 'true' ||
        needs.changes.outputs.ci == 'true') &&
        steps.kubeconform.outputs.cache-hit != 'true'
      uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      with:
        path: ~/tools/kubeconform
        key: kubeconform-0.8.0-linux-amd64
    - name: Kubeconform
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.helm == 'true' ||
        needs.changes.outputs.yaml == 'true' ||
        needs.changes.outputs.ci == 'true'
      run: |
        set -o pipefail
        helm template charts/k8s-httpcache --set image.repository=ghcr.io/example/k8s-httpcache \
          | ~/tools/kubeconform -strict -summary -ignore-missing-schemas
        ~/tools/kubeconform -strict -summary -ignore-missing-schemas \
          .github/test/manifest.yaml .github/test/manifest-tls.yaml
    - name: Restore helm-docs
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.helm == 'true' ||
        needs.changes.outputs.ci == 'true'
      uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      id: helm-docs
      with:
        path: ~/tools/helm-docs
        key: helm-docs-1.14.2-linux-amd64
    - name: Install helm-docs
      if: >-
        (startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.helm == 'true' ||
        needs.changes.outputs.ci == 'true') &&
        steps.helm-docs.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/tools
        curl -sfL https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz \
          | tar -xz -C ~/tools helm-docs
        chmod +x ~/tools/helm-docs
    - name: Save helm-docs
      if: >-
        (startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.helm == 'true' ||
        needs.changes.outputs.ci == 'true') &&
        steps.helm-docs.outputs.cache-hit != 'true'
      uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      with:
        path: ~/tools/helm-docs
        key: helm-docs-1.14.2-linux-amd64
    - name: Helm docs up to date
      if: >-
        startsWith(github.ref, 'refs/tags/') ||
        needs.changes.outputs.helm == 'true' ||
        needs.changes.outputs.ci == 'true'
      run: |
        ~/tools/helm-docs --chart-search-root charts/k8s-httpcache --log-level warning
        if ! git diff --exit-code -- charts/k8s-httpcache/README.md; then
          echo "::error::charts/k8s-httpcache/README.md is out of date; run helm-docs and commit it."
          exit 1
        fi


  go-build:
    name: Build binaries
    needs: [changes]
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.src == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false
    - name: Determine version
      id: version
      run: |
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
        else
          echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
        fi
    - name: Cache binaries
      id: cache
      # zizmor: ignore[cache-poisoning]
      uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      with:
        path: k8s-httpcache-linux-*
        key: binaries-${{ steps.version.outputs.value }}-${{ hashFiles('**/*.go', 'go.mod', 'go.sum') }}
    - name: Setup Go
      if: steps.cache.outputs.cache-hit != 'true'
      # zizmor: ignore[cache-poisoning]
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
      with:
        go-version-file: go.mod
    - name: Build binaries
      if: steps.cache.outputs.cache-hit != 'true'
      env:
        VERSION: ${{ steps.version.outputs.value }}
      run: |
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath \
          -ldflags "-s -w -X main.version=${VERSION} -extldflags \"-static\" -buildid=" \
          -o k8s-httpcache-linux-amd64 . &
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath \
          -ldflags "-s -w -X main.version=${VERSION} -extldflags \"-static\" -buildid=" \
          -o k8s-httpcache-linux-arm64 . &
        fail=0
        for pid in $(jobs -p); do wait "$pid" || fail=1; done
        exit $fail
    - name: Upload binaries
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: binaries
        path: k8s-httpcache-linux-*

  test:
    name: Integration test
    needs: [changes, unit-test, lint, go-build]
    if: >-
      !failure() && !cancelled() &&
      (startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.src == 'true' ||
      needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - varnish6/Dockerfile
          - varnish7/Dockerfile
          - varnish8/Dockerfile
          - varnish9/Dockerfile
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false
    - name: Download binaries
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: binaries
    - name: Restore test tools
      uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      id: test-tools
      with:
        path: ~/tools
        key: test-tools-hurl-8.0.1-oha-1.14.0
    - name: Install tools
      if: steps.test-tools.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/tools
        curl -sfL -o /tmp/hurl.deb https://github.com/Orange-OpenSource/hurl/releases/download/8.0.1/hurl_8.0.1_amd64.deb
        dpkg-deb -x /tmp/hurl.deb /tmp/hurl
        cp /tmp/hurl/usr/bin/* ~/tools/
        curl -sfL -o ~/tools/oha https://github.com/hatoo/oha/releases/download/v1.14.0/oha-linux-amd64
        chmod +x ~/tools/oha
    - name: Save test tools
      if: steps.test-tools.outputs.cache-hit != 'true'
      uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      with:
        path: ~/tools
        key: test-tools-hurl-8.0.1-oha-1.14.0
    - name: Add tools to PATH
      run: echo "$HOME/tools" >> "$GITHUB_PATH"
    - name: Build test image
      env:
        DOCKERFILE: ${{ matrix.dockerfile }}
      run: |
        mkdir .docker-context
        cp k8s-httpcache-linux-amd64 .docker-context/
        docker build -f ".github/test/$DOCKERFILE" \
          --build-arg BINARY=k8s-httpcache-linux-amd64 \
          -t localhost/k8s-httpcache:test .docker-context
    - name: Create kind cluster
      uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
      with:
        cluster_name: test
        config: .github/test/kind-config.yaml
    - name: Install ingress-nginx
      run: |
        url=https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.15.1/deploy/static/provider/kind/deploy.yaml
        kubectl apply -f "$url" > /dev/null
        kubectl wait -n ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=120s > /dev/null
        kubectl patch configmap -n ingress-nginx ingress-nginx-controller --type merge -p '{"data":{"upstream-keepalive-timeout":"5"}}' > /dev/null
    - name: Load image into kind
      run: kind load docker-image localhost/k8s-httpcache:test --name test -q
    - name: Deploy
      run: kubectl apply -f .github/test/manifest.yaml > /dev/null
    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/backend --timeout=120s
        kubectl rollout status -n test-ns deployment/backend-xns --timeout=120s
        kubectl rollout status deployment/k8s-httpcache --timeout=120s
    - name: Debug rollout failure
      if: failure()
      run: |
        kubectl get pods -A -o wide
        kubectl get events --sort-by='.lastTimestamp' --field-selector reason!=Pulled
        kubectl get events -n test-ns --sort-by='.lastTimestamp' --field-selector reason!=Pulled
        for pod in $(kubectl get pods -l app=k8s-httpcache -o name); do
          echo "--- $pod ---"
          kubectl describe "$pod"
          kubectl logs "$pod" --tail=50
        done
    - name: Smoke test
      run: .github/test/smoke-test.sh --report-junit smoke-report.xml
    - name: Metrics and broadcast smoke test
      run: .github/test/metrics-test.sh
    - name: Debounce test
      run: .github/test/debounce-test.sh
    - name: Shard Distribution test
      run: .github/test/shard-test.sh
    - name: Values update test
      run: .github/test/values-update-test.sh
    - name: Values-dir update test
      run: .github/test/values-dir-update-test.sh
    - name: VCL update test
      run: .github/test/vcl-update-test.sh
    - name: Static files test
      run: .github/test/static-files-test.sh
    - name: File-watch disable test
      run: .github/test/file-watch-disable-test.sh
    - name: Drain sessions test
      run: .github/test/drain-sessions-test.sh
    - name: Graceful drain test
      run: .github/test/drain-test.sh
    - name: Topology-aware routing test
      run: .github/test/topology-test.sh
    - name: Zero-downtime rollout restart
      run: .github/test/rollout-test.sh
    - name: TLS certificate test (Varnish 9)
      if: matrix.dockerfile == 'varnish9/Dockerfile'
      run: .github/test/tls-test.sh
    - name: Upload E2E test results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      if: always()
      with:
        name: e2e-test-results-${{ strategy.job-index }}
        path: |
          smoke-report.xml
          /tmp/oha.json
    - name: Show pod status on failure
      if: failure()
      run: |
        kubectl get pods -A -o wide
        kubectl describe pods -l app=k8s-httpcache
        kubectl logs -l app=k8s-httpcache --tail=50
        kubectl logs -l app=k8s-httpcache-tls --tail=50 || true
        kubectl logs -l app=backend --tail=50
        kubectl logs -n test-ns -l app=backend-xns --tail=50

  build:
    name: Build image
    needs: [changes, test]
    if: >-
      github.event_name != 'pull_request' &&
      !failure() && !cancelled() &&
      (startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.src == 'true' ||
      needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read       # checkout sources for the image build
      packages: write       # push the test/release image to GHCR
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false
    - name: Download binaries
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: binaries
    - name: Prepare Docker context
      run: |
        mkdir .docker-context
        cp k8s-httpcache-linux-* .docker-context/
    - name: Set SOURCE_DATE_EPOCH from commit
      run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"
    - name: Setup BuildKit
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      with:
        version: v0.35.0
        driver-opts: image=moby/buildkit:v0.31.0@sha256:a095b3d11ce1a9a05b6064ef515dfca0291ec5bcf2ea8178da8f6461924294e1
        cache-binary: false
    - name: Docker Login
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
      if: github.event_name != 'pull_request'
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Extract Metadata
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
      id: meta
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}
    - name: Docker push
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
      with:
        context: .docker-context
        file: .github/build/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        provenance: false
        sbom: false

  release:
    name: Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the GitHub release
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false
    - name: Download binaries
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: binaries
    - name: Create checksums
      run: sha256sum k8s-httpcache-linux-* > checksums.txt
    - name: Create or upload release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ github.ref_name }}
      run: |
        if gh release view "$TAG" > /dev/null 2>&1; then
          gh release upload "$TAG" \
            k8s-httpcache-linux-amd64 \
            k8s-httpcache-linux-arm64 \
            checksums.txt \
            --clobber
        else
          gh release create "$TAG" \
            k8s-httpcache-linux-amd64 \
            k8s-httpcache-linux-arm64 \
            checksums.txt \
            --generate-notes
        fi
