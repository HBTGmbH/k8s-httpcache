# -- Global values shared with subcharts (and consumed by this chart).
global:
  # -- Global image registry; used when image.registry is empty.
  imageRegistry: ""
  # -- Global image pull secrets; merged with imagePullSecrets.
  imagePullSecrets: []

# -- Number of replicas (ignored when autoscaling.enabled is true)
replicaCount: 1

image:
  # -- Container image registry (e.g. "docker.io", "registry.example.com/proxy").
  # When set, the image reference becomes registry/repository:tag.
  registry: ""
  # -- Container image repository
  repository: ""
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to appVersion)
  tag: ""
  # -- Image digest (e.g. "sha256:..."). When set, the image is referenced by
  # digest (repository@digest) and takes precedence over tag.
  digest: ""

# -- Image pull secrets (merged with global.imagePullSecrets)
imagePullSecrets: []
# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# -- Labels to add to all resources
commonLabels: {}
# -- Annotations to add to all resources
commonAnnotations: {}
# -- Extra labels added to selector matchLabels (and thus to pod labels and all label selectors).
# WARNING: changing these on an existing release will cause a new Deployment to be
# created and the old ReplicaSet to be orphaned.
selectorLabels: {}

# ===========================================================================
# CLI flag groups
# ===========================================================================
# -- Service name passed to --service-name (defaults to chart fullname)
serviceName: ""
# -- Namespace passed to --namespace (defaults to Release.Namespace)
namespace: ""
# -- Path to the VCL template inside the container
vclTemplate: /etc/k8s-httpcache/vcl.tmpl

# -- Varnish listen addresses (repeatable).
# Each entry is passed as --listen-addr value.
# Example: ["http=:8080,HTTP", "https=:8443,PROXY"]
# For native frontend TLS (Varnish 9+), add an https listener and configure
# tlsCerts below, e.g. ["http=:8080,http", "https=:8443,https"].
# Default (empty list): the application default "http=:8080,HTTP" is used.
listenAddrs: []

# -- Backend services (repeatable).
# Each entry: { name, service, port (optional) }
# Generates --backend=name:service or --backend=name:service:port
backends: []
# - name: origin
#   service: my-app
#   port: ""         # omit or empty to use service default

# -- Backend service discovery by label selector (repeatable).
# Each entry: { selector (map), port (optional), namespace (optional), allNamespaces (optional) }
# Services matching the selector are automatically added as backends.
# The backend name in .Backends is the Service name.
backendDiscovery: []
# - selector:
#     app: myapp
#   port: ""
#   namespace: ""        # defaults to release namespace
#   allNamespaces: false # set true to discover across all namespaces

# -- ConfigMaps to watch for template values (repeatable).
# Each entry: { name, configmap }
# Generates --values=name:configmap
values: []
# - name: myvals
#   configmap: my-configmap

# -- Secrets to watch for template values (repeatable).
# Each entry: { name, secret }
# Generates --secrets=name:secret
secrets: []
# - name: mysecrets
#   secret: my-secret

# -- kubernetes.io/tls Secrets to install as frontend TLS certificates (Varnish 9+, repeatable).
# Each entry: { name, secret } where secret references a Secret with tls.crt/tls.key
# (e.g. produced by cert-manager). Generates --tls-cert=name:secret.
# Requires an https listener in listenAddrs (e.g. "https=:8443,https").
# Certificates are hot-reloaded on rotation without restarting Varnish; multiple
# entries are selected by SNI. The 'name' is a logical/SNI label.
tlsCerts: []
# - name: frontend
#   secret: my-tls          # cross-namespace: certs/my-tls

# -- Directories to poll for YAML template values (repeatable).
# Each entry: { name, path, configMap (optional - creates a volume from this ConfigMap) }
# Generates --values-dir=name:path
valuesDirs: []
# - name: mydir
#   path: /etc/values-dir
#   configMap: my-dir-configmap

# -- Poll interval for the values-dir directories (empty = app default 5s).
# Only effective when valuesDirWatch is enabled.
valuesDirPollInterval: ""

# -- Watch the values-dir directories for changes and reload VCL on change,
# INDEPENDENT of vcl.fileWatch (which governs the VCL template). Off by default.
# Set true to auto-reload on values-dir changes; empty inherits vcl.fileWatch.
# When off, values-dir changes are not auto-applied - restart pods to pick them up
# (the values-dir ConfigMap is externally referenced, so there is no checksum
# annotation to roll pods automatically, unlike VCL/static files).
valuesDirWatch: false

# -- Annotation keys or prefixes to exclude from backend `.Annotations` (repeatable).
# A trailing `*` matches a prefix (e.g. "kubectl.kubernetes.io/*").
# `kubectl.kubernetes.io/last-applied-configuration` is always excluded by default.
excludeAnnotations: []
# - kubectl.kubernetes.io/*

# ===========================================================================
# Cache binary paths (Varnish Cache / Vinyl Cache)
# ===========================================================================
# When neither varnish nor vinyl paths are set, auto-detection is used:
# if "vinyld" is found on PATH, Vinyl Cache binaries are preferred,
# otherwise Varnish Cache binaries are used.
varnish:
  # -- Path to varnishd binary (empty = auto-detect)
  varnishdPath: ""
  # -- Path to varnishadm binary (empty = auto-detect)
  varnishadmPath: ""
  # -- Path to varnishstat binary (empty = auto-detect)
  varnishstatPath: ""
  # -- Max time to wait for the cache admin CLI to become ready (empty = app default 30s)
  adminTimeout: ""

vinyl:
  # -- Path to vinyld binary (Vinyl Cache 9+; takes precedence over varnish paths)
  vinyldPath: ""
  # -- Path to vinyladm binary (Vinyl Cache 9+; takes precedence over varnish paths)
  vinyladmPath: ""
  # -- Path to vinylstat binary (Vinyl Cache 9+; takes precedence over varnish paths)
  vinylstatPath: ""
  # -- Path to vinylncsa binary (Vinyl Cache 9+; takes precedence over varnishncsa.path)
  vinylncsaPath: ""

# ===========================================================================
# Broadcast settings
# ===========================================================================
broadcast:
  # -- Enable the broadcast HTTP server (false sets --broadcast-addr=none)
  enabled: true
  # -- Listen address for the broadcast server (empty = app default ":8088")
  addr: ""
  # -- Name of the --listen-addr to target for fan-out (empty = first listen addr)
  targetListenAddr: ""
  # -- Time to wait for broadcast connections to drain (empty = app default 30s)
  drainTimeout: ""
  # -- Time to wait for in-flight requests after draining (empty = app default 5s)
  shutdownTimeout: ""
  # -- Max idle time for client keep-alive connections (empty = app default 120s)
  serverIdleTimeout: ""
  # -- Max time to read request headers on broadcast server (empty = app default 10s)
  readHeaderTimeout: ""
  # -- Max time to read the entire request, headers + body (empty = app default 15s)
  readTimeout: ""
  # -- Max time to write the response, must exceed read + client timeouts (empty = app default 30s)
  writeTimeout: ""
  # -- Max idle time for connections to Varnish pods (empty = app default 4s)
  clientIdleTimeout: ""
  # -- Timeout for each fan-out request (empty = app default 3s)
  clientTimeout: ""

# ===========================================================================
# Metrics / Prometheus
# ===========================================================================
metrics:
  # -- Enable the metrics HTTP server (false sets --metrics-addr=none)
  enabled: true
  # -- Listen address for the metrics server (empty = app default ":9101")
  addr: ""
  # -- Max time to read request headers on metrics server (empty = app default 10s)
  readHeaderTimeout: ""
  # -- Max time to read the entire request, headers + body (empty = app default 15s)
  readTimeout: ""
  # -- Max time to write the response (empty = app default 15s)
  writeTimeout: ""
  # -- Max idle time for keep-alive connections on metrics server (empty = app default 120s)
  idleTimeout: ""
  # -- Enable varnishstat Prometheus exporter
  varnishstatExport: false
  # -- Counter groups to export (empty = all). Only effective when varnishstatExport is true.
  varnishstatExportFilter: ""
  # -- Add the de-facto prometheus.io/{scrape,path,port} annotations to the pods
  # for annotation-based Prometheus discovery. Leave false when using the
  # ServiceMonitor or PodMonitor to avoid double scraping.
  scrapeAnnotations: false

# ===========================================================================
# Access logging (varnishncsa)
# ===========================================================================
varnishncsa:
  # -- Enable varnishncsa access logging subprocess
  enabled: false
  # -- Path to varnishncsa binary (empty = app default "varnishncsa")
  path: ""
  # -- Custom log format string (empty = app default)
  format: ""
  # -- VSL query expression (empty = none)
  query: ""
  # -- Log backend requests instead of client requests
  backend: false
  # -- Output file path (empty = stdout)
  output: ""
  # -- Prefix for each access log line on stdout (empty = app default "[access] ")
  prefix: ""

# ===========================================================================
# Drain (graceful connection draining)
# ===========================================================================
drain:
  # -- Enable graceful connection draining on shutdown
  enabled: true
  # -- Delay before polling for active sessions (empty = app default 15s)
  delay: ""
  # -- Poll interval for active sessions (empty = app default 1s)
  pollInterval: ""
  # -- Max time to wait for sessions to reach 0 (empty = app default 0s)
  timeout: ""

# ===========================================================================
# Template settings
# ===========================================================================
template:
  # -- Template delimiters (empty = app default "<< >>")
  delims: ""
  # -- Template function library: "sprig" (default) or "sprout" (empty = app default sprig)
  funcs: ""
  # -- Topology zone override (empty = auto-detect from NODE_NAME)
  zone: ""

# ===========================================================================
# Debounce settings
# ===========================================================================
debounce:
  # -- Debounce duration for endpoint changes (empty = app default 2s)
  duration: ""
  # -- Maximum debounce duration before forced reload (empty = app default 0s)
  max: ""
  # -- Debounce duration for frontend changes (empty = inherits duration)
  frontendDuration: ""
  # -- Max debounce duration for frontend changes (empty = inherits max)
  frontendMax: ""
  # -- Debounce duration for backend changes (empty = inherits duration)
  backendDuration: ""
  # -- Max debounce duration for backend changes (empty = inherits max)
  backendMax: ""
  # -- Debounce duration for TLS certificate changes (empty = inherits duration)
  tlsCertDuration: ""
  # -- Max debounce duration for TLS certificate changes (empty = inherits max)
  tlsCertMax: ""
  # -- Histogram bucket boundaries for debounce_latency_seconds metric (empty = app default)
  latencyBuckets: ""

# ===========================================================================
# Logging
# ===========================================================================
logging:
  # -- Log level: DEBUG, INFO, WARN, ERROR (empty = app default INFO)
  level: ""
  # -- Log format: text, json (empty = app default text)
  format: ""

# ===========================================================================
# VCL settings
# ===========================================================================
vcl:
  # -- Time to wait for varnishd to exit before SIGKILL (empty = app default 30s)
  shutdownTimeout: ""
  # -- Poll interval for VCL template file changes (empty = app default 5s)
  templateWatchInterval: ""
  # -- Watch the VCL **template** file for changes and reload VCL on change (off
  # by default). Independent of values-dir (see `valuesDirWatch`); it is also the
  # default for `valuesDirWatch`.
  # Empty omits the flag (app default); set true/false explicitly.
  fileWatch: false
  # -- Max retry attempts for vcl.load failures (empty = app default 3)
  reloadRetries: ""
  # -- Wait between vcl.load retry attempts (empty = app default 2s)
  reloadRetryInterval: ""
  # -- Number of old VCL objects to retain after reload (empty = app default 0)
  kept: ""

# ===========================================================================
# Startup / Kubernetes API timing
# ===========================================================================
timing:
  # -- Max time to wait for the initial endpoint snapshot at startup (empty = app default 3m, 0 = no limit)
  startupTimeout: ""
  # -- Timeout for one-shot Kubernetes API calls at startup (empty = app default 30s)
  kubeApiTimeout: ""

# ===========================================================================
# Extra varnishd arguments (passed after --)
# ===========================================================================
# -- Extra arguments passed to varnishd after the -- separator
# Example: ["-s", "default,1M", "-p", "default_grace=0"]
varnishdExtraArgs: []

# ===========================================================================
# VCL template content
# ===========================================================================
# -- VCL template rendered into the ConfigMap.
# This default provides a simple round-robin setup that works out of the box.
# @default -- a round-robin VCL template (see values.yaml)
vclTemplateContent: |
  vcl 4.1;

  import directors;
  import std;

  <<- range .Frontends >>
  backend << .Name >> {
    .host = "<< .Host >>";
    .port = "<< .Port >>";
  }
  <<- end >>

  <<- range $name, $bg := .Backends >>
  <<- range $bg.Endpoints >>
  backend << .Name >>_<< $name >> {
    .host = "<< .Host >>";
    .port = "<< .Port >>";
  }
  <<- end >>
  <<- end >>

  acl purge {
    "127.0.0.0/8";
  }

  sub vcl_init {
    <<- if .Frontends >>
    new cluster = directors.shard();
    <<- range .Frontends >>
    cluster.add_backend(<< .Name >>);
    <<- end >>
    cluster.reconfigure();
    <<- end >>

    <<- range $name, $bg := .Backends >>
    new backend_<< $name >> = directors.round_robin();
    <<- range $bg.Endpoints >>
    backend_<< $name >>.add_backend(<< .Name >>_<< $name >>);
    <<- end >>
    <<- end >>
  }

  sub handle_readiness {
    if (req.url == "/ready") {
      return (synth(200));
    }
  }

  sub vcl_recv {
    call handle_readiness;

    if (req.method == "PURGE") {
      if (!client.ip ~ purge) {
        return (synth(405, "Not allowed"));
      }
      return (purge);
    }

    <<- if .Frontends >>
    if (!req.http.X-Shard-Routed && !req.http.X-No-Shard) {
      set req.backend_hint = cluster.backend(by=URL);
      set req.http.x-shard = req.backend_hint;
      if (req.http.x-shard != server.identity) {
        set req.http.X-Shard-Routed = "true";
        return(pass);
      }
    }
    <<- end >>

    <<- $backendNames := keys .Backends >>
    <<- if eq (len $backendNames) 1 >>
    <<- range $name, $_ := .Backends >>
    set req.backend_hint = backend_<< $name >>.backend();
    <<- end >>
    <<- else >>
    <<- range $name, $_ := .Backends >>
    if (req.url ~ "^/<< $name >>/") {
      set req.backend_hint = backend_<< $name >>.backend();
    }
    <<- end >>
    <<- end >>
  }

  sub vcl_purge {
    return (synth(200, "Purged"));
  }

# ===========================================================================
# Static files (optional)
# ===========================================================================
# -- Serve small static files (robots.txt, health JSON, HTML, CSS, SVG) directly
# from Varnish via std.fileread. When enabled, `staticFiles.files` are rendered
# into a ConfigMap and mounted read-only at `staticFiles.mountPath`; add a small
# vcl_recv/vcl_synth snippet to vclTemplateContent to serve them (see README).
# Text content only - binary files (favicon.ico, images) are not supported
# because std.fileread truncates at the first NUL byte. A content change rolls
# the pods (`checksum/static`), because std.fileread caches file content for the
# varnishd process lifetime and is NOT refreshed by a VCL reload.
staticFiles:
  # -- Render the static-files ConfigMap, volume and mount. When false nothing
  # is added and the chart renders exactly as before.
  enabled: false
  # -- Mount path for the static files (read-only). MUST be a sibling of
  # /etc/k8s-httpcache, never nested under it (that path is the read-only VCL
  # template mount). Reference these paths from std.fileread in your VCL.
  mountPath: /etc/k8s-httpcache-static
  # -- Static text files as a map of filename -> content (becomes the ConfigMap
  # `data`). Works with `--set-file`, e.g.
  # `--set-file 'staticFiles.files.robots\.txt=./robots.txt'`.
  files: {}
  #  robots.txt: |
  #    User-agent: *
  #    Disallow:
  #  health.json: |
  #    {"status":"ok"}
  # -- Mount this pre-existing ConfigMap instead of generating one from `files`.
  # Its keys are the filenames available under `mountPath`. When set, `files` is
  # ignored and no ConfigMap is created. Changes are not auto-detected - restart
  # the pods to pick them up (std.fileread caches content until the varnishd
  # process restarts).
  existingConfigMap: ""

# ===========================================================================
# Kubernetes resources
# ===========================================================================
serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- Annotations for the ServiceAccount
  annotations: {}
  # -- ServiceAccount name (defaults to chart fullname)
  name: ""
  # -- Automount API credentials
  automountServiceAccountToken: true

rbac:
  # -- Create RBAC resources (Role, RoleBinding)
  create: true
  # -- Create ClusterRole for node access (zone auto-detection).
  # "auto" creates it when template.zone is empty; set true/false to override.
  createClusterRole: auto

# -- Annotations to add to pods
podAnnotations: {}
# -- Labels to add to pods
podLabels: {}

# -- Pod-level security context
podSecurityContext: {}

# -- Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  privileged: false
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

container:
  # -- HTTP port exposed by the varnishd process
  httpPort: 8080
  # -- HTTPS port exposed by the varnishd process (only when tlsCerts is set).
  httpsPort: 8443
  # -- Broadcast port exposed by the k8s-httpcache container
  httpBroadcastPort: 8088
  # -- Metrics port exposed by the k8s-httpcache container
  httpMetricsPort: 9101

service:
  # -- Service type
  type: ClusterIP
  # -- HTTP port exposed by the Service
  httpPort: 80
  # -- HTTPS port exposed by the Service (only when tlsCerts is set).
  httpsPort: 443
  # -- Broadcast port exposed by the Service
  httpBroadcastPort: 8088
  # -- Metrics port exposed by the Service
  httpMetricsPort: 9101
  # -- Annotations for the Service
  annotations: {}
  # -- External traffic policy: Cluster or Local (for type LoadBalancer/NodePort; empty = omit)
  externalTrafficPolicy: ""
  # -- Internal traffic policy: Cluster or Local (empty = omit)
  internalTrafficPolicy: ""
  # -- loadBalancerClass for type LoadBalancer (empty = omit)
  loadBalancerClass: ""
  # -- Source CIDR ranges allowed to reach a LoadBalancer Service (empty list = omit)
  loadBalancerSourceRanges: []
  # -- Session affinity: None or ClientIP (empty = omit)
  sessionAffinity: ""
  # -- Session affinity configuration (e.g. clientIP.timeoutSeconds)
  sessionAffinityConfig: {}

# -- Deployment strategy (ignored when argoRollouts.enabled is true)
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# ===========================================================================
# Argo Rollouts (optional, requires the Argo Rollouts controller and CRDs)
# ===========================================================================
argoRollouts:
  # -- Render the workload as an Argo Rollouts Rollout instead of a Deployment.
  # The HPA/VPA scale target ref is switched to the Rollout automatically.
  enabled: false
  # -- Rollout strategy (canary or blueGreen). When empty, defaults to a basic
  # canary (`canary: {}`). Reference analysisTemplates from the steps here.
  strategy: {}
  #  canary:
  #    steps:
  #      - setWeight: 25
  #      - pause: { duration: 60 }
  #      - analysis:
  #          templates:
  #            - templateName: <release>-success-rate
  # -- AnalysisTemplates to render (list of { name, spec }). Each is named after
  # the chart fullname plus the entry name. Only rendered when argoRollouts.enabled is true.
  analysisTemplates: []
  #  - name: success-rate
  #    spec:
  #      metrics:
  #        - name: success-rate
  #          interval: 1m
  #          successCondition: result[0] >= 0.95
  #          provider:
  #            prometheus:
  #              address: http://prometheus.monitoring:9090
  #              query: |
  #                sum(rate(k8s_httpcache_... [1m]))

# -- Resource requests and limits
resources: {}
# requests:
#   cpu: 10m
#   memory: 8Mi
# limits:
#   memory: 128Mi

# ===========================================================================
# Ephemeral working-directory volumes
# ===========================================================================
# -- Backing for the container's /tmp (rendered VCL) and /var/lib/varnish
# (varnishd workdir / shared memory log). Defaults preserve the previous
# behaviour (in-memory emptyDir). Set `medium: ""` to use node disk (e.g. for
# large file-backed `-s file` storage, since a Memory emptyDir counts against
# the pod's memory), add a `sizeLimit`, or supply a full `volume` spec to
# replace the emptyDir entirely (e.g. a persistentVolumeClaim).
volumes:
  tmp:
    # -- emptyDir medium for /tmp ("Memory" or "" for node disk)
    medium: Memory
    # -- emptyDir size limit for /tmp (e.g. 256Mi; empty = no limit)
    sizeLimit: ""
    # -- Full volume spec for /tmp; when set it replaces the emptyDir entirely
    volume: {}
    #  persistentVolumeClaim:
    #    claimName: my-tmp-pvc
  varnishWorkdir:
    # -- emptyDir medium for /var/lib/varnish ("Memory" or "" for node disk)
    medium: Memory
    # -- emptyDir size limit for /var/lib/varnish (e.g. 512Mi; empty = no limit)
    sizeLimit: ""
    # -- Full volume spec for /var/lib/varnish; when set it replaces the emptyDir entirely
    volume: {}

# -- Node selector
nodeSelector: {}
# -- Tolerations
tolerations: []
# -- Affinity rules
affinity: {}
# -- Topology spread constraints
topologySpreadConstraints: []
# -- Termination grace period in seconds
terminationGracePeriodSeconds: 90
# -- Priority class name for pod scheduling priority
priorityClassName: ""
# -- Scheduler name for the pods
schedulerName: ""
# -- Runtime class name (e.g. gVisor, Kata Containers)
runtimeClassName: ""
# -- DNS policy (ClusterFirst, Default, None, ClusterFirstWithHostNet)
dnsPolicy: ""
# -- Custom DNS configuration
dnsConfig: {}
# -- Host aliases (extra entries for the pod's /etc/hosts)
hostAliases: []
# -- Inject Service environment variables. Empty = Kubernetes default (true);
# set false to reduce environment clutter.
enableServiceLinks: ""
# -- Cluster DNS domain, used to build the in-cluster Service FQDN (e.g. for Istio resources)
clusterDomain: cluster.local
# -- Number of old ReplicaSets to retain for rollback
revisionHistoryLimit: ""
# -- Minimum seconds a new pod must be ready before it is considered available (empty = omit)
minReadySeconds: ""

# -- Startup probe configuration
startupProbe:
  httpGet:
    path: /ready
    port: http
  failureThreshold: 30
  periodSeconds: 1
# -- Liveness probe configuration (only used when metrics.enabled is true)
livenessProbe:
  httpGet:
    path: /healthz
    port: http-m
  periodSeconds: 1
  failureThreshold: 3
# -- Readiness probe configuration (only used when metrics.enabled is true)
readinessProbe:
  httpGet:
    path: /readyz
    port: http-m
  periodSeconds: 1
  failureThreshold: 1

# -- Container lifecycle hooks (e.g. preStop, postStart)
lifecycle: {}
# preStop:
#   exec:
#     command: ["/bin/sh", "-c", "sleep 10"]

# -- Extra init containers to add to the pod
extraInitContainers: []
# -- Extra containers (sidecars) to add to the pod
extraContainers: []
# -- Extra volumes to add to the pod
extraVolumes: []
# -- Extra volume mounts to add to the container
extraVolumeMounts: []
# -- Extra environment variables to add to the container
extraEnv: []
# -- Extra arguments appended before the -- separator
extraArgs: []
# -- Extra raw manifests to render with the release. Each entry is a Kubernetes
# object (or a templated string) rendered through `tpl`, e.g. an ExternalSecret.
extraManifests: []
#  - apiVersion: v1
#    kind: ConfigMap
#    metadata:
#      name: '{{ include "k8s-httpcache.fullname" . }}-extra'
#    data:
#      key: value

# ===========================================================================
# Ingress (optional)
# ===========================================================================
ingress:
  # -- Enable Ingress
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Annotations for the Ingress
  annotations: {}
  # -- Ingress hosts
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  # -- TLS configuration
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# ===========================================================================
# Gateway API HTTPRoute (optional, requires Gateway API CRDs)
# ===========================================================================
httpRoute:
  # -- Enable HTTPRoute (Gateway API)
  enabled: false
  # -- Annotations for the HTTPRoute
  annotations: {}
  # -- Parent gateway references
  parentRefs: []
  #  - name: my-gateway
  #    namespace: gateway-ns
  #    sectionName: https
  # -- Hostnames to match
  hostnames: []
  #  - chart-example.local
  # -- Routing rules
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

# ===========================================================================
# ServiceMonitor (optional, requires Prometheus Operator)
# ===========================================================================
serviceMonitor:
  # -- Enable Prometheus ServiceMonitor
  enabled: false
  # -- Namespace for the ServiceMonitor (defaults to release namespace)
  namespace: ""
  # -- Additional labels for the ServiceMonitor
  labels: {}
  # -- Scrape interval
  interval: ""
  # -- Scrape timeout
  scrapeTimeout: ""
  # -- Relabelings
  relabelings: []

# ===========================================================================
# PodDisruptionBudget (optional)
# ===========================================================================
podDisruptionBudget:
  # -- Enable PDB
  enabled: false
  # -- Minimum available pods
  minAvailable: ""
  # -- Maximum unavailable pods
  maxUnavailable: ""

# ===========================================================================
# HorizontalPodAutoscaler (optional)
# ===========================================================================
autoscaling:
  # -- Enable HPA
  enabled: false
  # -- Minimum replicas
  minReplicas: 1
  # -- Maximum replicas
  maxReplicas: 10
  # -- Target CPU utilization percentage
  targetCPU: ""
  # -- Target memory utilization percentage
  targetMemory: ""
  # -- Scaling behavior (scaleUp/scaleDown stabilization windows and policies)
  behavior: {}

# ===========================================================================
# VerticalPodAutoscaler (optional, requires the VPA CRD)
# ===========================================================================
verticalPodAutoscaler:
  # -- Enable VerticalPodAutoscaler. Do not combine with autoscaling (HPA) on the
  # same CPU/memory resource.
  enabled: false
  # -- Annotations for the VPA
  annotations: {}
  # -- Update mode: Off, Initial, Recreate, Auto
  updateMode: "Off"
  # -- Per-container resource policy (minAllowed/maxAllowed/controlledResources)
  resourcePolicy: {}

# ===========================================================================
# NetworkPolicy (optional)
# ===========================================================================
networkPolicy:
  # -- Enable NetworkPolicy
  enabled: false
  # -- Annotations for the NetworkPolicy
  annotations: {}
  # -- Policy types to enforce
  policyTypes:
    - Ingress
    - Egress
  # -- Allow DNS egress (UDP/TCP 53). Egress to the Kubernetes API server and to
  # backends is cluster-specific and must be added via networkPolicy.egress.
  allowDNS: true
  # -- Ingress rules. When empty, a default rule allows traffic to the exposed
  # ports (http, plus https/broadcast/metrics when enabled) from any source.
  ingress: []
  # -- Additional egress rules (appended after the DNS rule when allowDNS is true)
  egress: []

# ===========================================================================
# Istio (optional, requires Istio CRDs)
# ===========================================================================
istio:
  virtualService:
    # -- Enable Istio VirtualService
    enabled: false
    # -- Annotations for the VirtualService
    annotations: {}
    # -- Gateways to bind (empty = mesh-internal only)
    gateways: []
    # -- Hosts to match (empty = the Service short name)
    hosts: []
    # -- HTTP routes. When empty, a default route to the Service is generated.
    http: []
    # -- TLS routes
    tls: []
    # -- TCP routes
    tcp: []
  destinationRule:
    # -- Enable Istio DestinationRule
    enabled: false
    # -- Annotations for the DestinationRule
    annotations: {}
    # -- Host (empty = the in-cluster Service FQDN)
    host: ""
    # -- Traffic policy (load balancing, connection pool, outlier detection, TLS)
    trafficPolicy: {}
    # -- Subsets for traffic splitting
    subsets: []
  sidecar:
    # -- Enable Istio Sidecar resource
    enabled: false
    # -- Annotations for the Sidecar
    annotations: {}
    # -- Scope the Sidecar to this app's pods via a workloadSelector (false = namespace-wide)
    workloadSelector: true
    # -- Inbound listeners
    ingress: []
    # -- Egress hosts. When empty, defaults to this namespace plus istio-system.
    egress: []
    # -- Outbound traffic policy (e.g. mode: REGISTRY_ONLY)
    outboundTrafficPolicy: {}
  authorizationPolicy:
    # -- Enable Istio AuthorizationPolicy (L7 access control)
    enabled: false
    # -- Annotations for the AuthorizationPolicy
    annotations: {}
    # -- Action: ALLOW, DENY, AUDIT, CUSTOM
    action: ALLOW
    # -- External authorization provider (only for action: CUSTOM)
    provider: {}
    # -- Authorization rules
    rules: []
  peerAuthentication:
    # -- Enable Istio PeerAuthentication (mTLS mode)
    enabled: false
    # -- Annotations for the PeerAuthentication
    annotations: {}
    # -- Mesh-wide mTLS settings for the workload
    mtls:
      mode: STRICT
    # -- Per-port mTLS overrides (port number -> { mode })
    portLevelMtls: {}
  requestAuthentication:
    # -- Enable Istio RequestAuthentication (JWT validation)
    enabled: false
    # -- Annotations for the RequestAuthentication
    annotations: {}
    # -- JWT rules (issuer, jwksUri, etc.)
    jwtRules: []

# ===========================================================================
# PodMonitor (optional, requires Prometheus Operator)
# ===========================================================================
# Alternative to serviceMonitor - scrapes pods directly. Enable only one.
podMonitor:
  # -- Enable Prometheus PodMonitor
  enabled: false
  # -- Namespace for the PodMonitor (defaults to release namespace)
  namespace: ""
  # -- Additional labels for the PodMonitor
  labels: {}
  # -- Scrape interval
  interval: ""
  # -- Scrape timeout
  scrapeTimeout: ""
  # -- Relabelings
  relabelings: []

# ===========================================================================
# PrometheusRule (optional, requires Prometheus Operator)
# ===========================================================================
prometheusRule:
  # -- Enable Prometheus PrometheusRule (alerting/recording rules)
  enabled: false
  # -- Namespace for the PrometheusRule (defaults to release namespace)
  namespace: ""
  # -- Additional labels for the PrometheusRule (e.g. to match the Prometheus ruleSelector)
  labels: {}
  # -- Include the built-in default alert rules (varnishd down, no ready backend
  # endpoints, VCL render errors, VCL rollbacks)
  defaultRules: true
  # -- Extra rule groups (passthrough, appended after the default group)
  rules: []
  #  - name: my-extra-rules
  #    rules:
  #      - alert: MyAlert
  #        expr: vector(1)

# ===========================================================================
# Grafana dashboards (optional)
# ===========================================================================
grafanaDashboards:
  # -- Enable Grafana dashboard ConfigMaps (one per entry)
  enabled: false
  # -- Label key the Grafana sidecar watches for dashboard auto-import
  label: grafana_dashboard
  # -- Value for the dashboard label
  labelValue: "1"
  # -- Annotations added to each dashboard ConfigMap (e.g. k8s-sidecar folder)
  annotations: {}
  # -- Dashboards to render, keyed by name. Each value is dashboard JSON (string)
  # or an object (rendered to JSON). Each becomes a ConfigMap data key, the entry
  # name suffixed with .json.
  dashboards: {}
  #  overview: |
  #    { "title": "k8s-httpcache", "panels": [] }

# ===========================================================================
# Gateway API ReferenceGrant (optional, requires Gateway API CRDs)
# ===========================================================================
referenceGrant:
  # -- Enable a ReferenceGrant allowing cross-namespace references to the Service
  enabled: false
  # -- Annotations for the ReferenceGrant
  annotations: {}
  # -- Allowed referents (list of { group, kind, namespace }), e.g. HTTPRoutes in
  # another namespace.
  from: []
  #  - group: gateway.networking.k8s.io
  #    kind: HTTPRoute
  #    namespace: other-namespace
  # -- Targets the grant permits references to (empty = this chart's Service)
  to: []

# ===========================================================================
# Helm test hooks (`helm test`)
# ===========================================================================
tests:
  # -- Image (pinned, not :latest) for the curl-based `helm test` pods
  # (connection / metrics / varnishstat). Pinned so the rendered manifests pass
  # kube-linter's latest-tag check; override to point at a mirror.
  curlImage: curlimages/curl:8.21.0
  # -- Image (pinned, not :latest) for the kubectl-based RBAC `helm test` pod.
  # Uses a shell-capable image with pinnable tags (registry.k8s.io/kubectl is
  # distroless with no shell; bitnami/kubectl no longer publishes version tags).
  kubectlImage: alpine/kubectl:1.36.2
