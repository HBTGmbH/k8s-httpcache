{{- if .Values.serviceMonitor.enabled -}}
{{- if not .Values.metrics.enabled }}
{{- fail "serviceMonitor.enabled requires metrics.enabled=true: the ServiceMonitor scrapes the 'http-m' metrics port, which is only created when metrics.enabled is true" }}
{{- end }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "k8s-httpcache.fullname" . }}
  namespace: {{ .Values.serviceMonitor.namespace | default .Release.Namespace }}
  labels:
    {{- include "k8s-httpcache.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 4 }}
    {{- end }}
  {{- with include "k8s-httpcache.annotations" (dict "root" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "k8s-httpcache.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: http-m
      path: /metrics
      {{- with .Values.serviceMonitor.interval }}
      interval: {{ . }}
      {{- end }}
      {{- with .Values.serviceMonitor.scrapeTimeout }}
      scrapeTimeout: {{ . }}
      {{- end }}
      {{- with .Values.serviceMonitor.relabelings }}
      relabelings:
        {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 8 }}
      {{- end }}
{{- end }}
