{{- /*
  Fail fast when tlsCerts is set but no listenAddrs entry declares the 'https'
  protocol: the controller would otherwise exit at startup ("--tls-cert requires
  a --listen-addr with the 'https' protocol") and CrashLoopBackoff. Mirrors the
  app's hasHTTPSListener check (proto tokens after the address).
*/}}
{{- if .Values.tlsCerts }}
{{- $hasHTTPS := false }}
{{- range .Values.listenAddrs }}
{{- range rest (splitList "," .) }}
{{- if eq (lower (trim .)) "https" }}{{- $hasHTTPS = true }}{{- end }}
{{- end }}
{{- end }}
{{- if not $hasHTTPS }}
{{- fail "tlsCerts is set but no listenAddrs entry uses the 'https' protocol; add an https listener, e.g. listenAddrs: [\"http=:8080,http\", \"https=:8443,https\"]" }}
{{- end }}
{{- end }}
{{- if and .Values.staticFiles.enabled (not (or .Values.staticFiles.files .Values.staticFiles.existingConfigMap)) }}
{{- fail "staticFiles.enabled is true but neither staticFiles.files nor staticFiles.existingConfigMap is set; provide files to serve (staticFiles.files) or an existing ConfigMap (staticFiles.existingConfigMap), or set staticFiles.enabled: false" }}
{{- end }}
{{- if .Values.argoRollouts.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
{{- else }}
apiVersion: apps/v1
kind: Deployment
{{- end }}
metadata:
  name: {{ include "k8s-httpcache.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-httpcache.labels" . | nindent 4 }}
  {{- with include "k8s-httpcache.annotations" (dict "root" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  {{- with .Values.revisionHistoryLimit }}
  revisionHistoryLimit: {{ . }}
  {{- end }}
  {{- if ne (toString .Values.minReadySeconds) "" }}
  minReadySeconds: {{ .Values.minReadySeconds }}
  {{- end }}
  {{- if .Values.argoRollouts.enabled }}
  strategy:
    {{- if .Values.argoRollouts.strategy }}
    {{- include "k8s-httpcache.tpl" (dict "value" .Values.argoRollouts.strategy "ctx" $) | nindent 4 }}
    {{- else }}
    canary: {}
    {{- end }}
  {{- else }}
  {{- with .Values.strategy }}
  strategy:
    {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 4 }}
  {{- end }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "k8s-httpcache.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- $fw := lower (toString .Values.vcl.fileWatch) }}
        {{- if or (eq $fw "false") (eq $fw "0") (eq $fw "f") }}
        checksum/vcl: {{ get (include (print .Template.BasePath "/configmap-vcl.yaml") . | fromYaml) "data" | toYaml | sha256sum }}
        {{- end }}
        {{- if and .Values.staticFiles.enabled .Values.staticFiles.files (not .Values.staticFiles.existingConfigMap) }}
        checksum/static: {{ get (include (print .Template.BasePath "/configmap-static.yaml") . | fromYaml) "data" | toYaml | sha256sum }}
        {{- end }}
        {{- if and .Values.metrics.enabled .Values.metrics.scrapeAnnotations }}
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: {{ .Values.container.httpMetricsPort | default 9101 | quote }}
        {{- end }}
      {{- with .Values.podAnnotations }}
        {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 8 }}
      {{- end }}
      labels:
        {{- include "k8s-httpcache.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 8 }}
        {{- end }}
    spec:
      {{- with (concat (default (list) (.Values.global).imagePullSecrets) (default (list) .Values.imagePullSecrets)) }}
      imagePullSecrets:
        {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "k8s-httpcache.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if ne (toString .Values.enableServiceLinks) "" }}
      enableServiceLinks: {{ .Values.enableServiceLinks }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.schedulerName }}
      schedulerName: {{ . }}
      {{- end }}
      {{- with .Values.runtimeClassName }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 8 }}
      {{- end }}
      {{- with .Values.dnsPolicy }}
      dnsPolicy: {{ . }}
      {{- end }}
      {{- with .Values.dnsConfig }}
      dnsConfig:
        {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 8 }}
      {{- end }}
      {{- with .Values.extraInitContainers }}
      initContainers:
        {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "k8s-httpcache.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 12 }}
          {{- end }}
          args:
            {{- /* --- Required flags --- */}}
            - --service-name={{ include "k8s-httpcache.tpl" (dict "value" (default (include "k8s-httpcache.fullname" .) .Values.serviceName) "ctx" $) }}
            - --namespace={{ include "k8s-httpcache.tpl" (dict "value" (default "$(NAMESPACE)" .Values.namespace) "ctx" $) }}
            - --vcl-template={{ include "k8s-httpcache.tpl" (dict "value" .Values.vclTemplate "ctx" $) }}
            {{- /* --- Cache binary paths --- */}}
            {{- with .Values.varnish.varnishdPath }}
            - --varnishd-path={{ . }}
            {{- end }}
            {{- with .Values.varnish.varnishadmPath }}
            - --varnishadm-path={{ . }}
            {{- end }}
            {{- with .Values.varnish.varnishstatPath }}
            - --varnishstat-path={{ . }}
            {{- end }}
            {{- with .Values.vinyl.vinyldPath }}
            - --vinyld-path={{ . }}
            {{- end }}
            {{- with .Values.vinyl.vinyladmPath }}
            - --vinyladm-path={{ . }}
            {{- end }}
            {{- with .Values.vinyl.vinylstatPath }}
            - --vinylstat-path={{ . }}
            {{- end }}
            {{- with .Values.vinyl.vinylncsaPath }}
            - --vinylncsa-path={{ . }}
            {{- end }}
            {{- with .Values.varnish.adminTimeout }}
            - --admin-timeout={{ . }}
            {{- end }}
            {{- /* --- Listen addresses (repeatable) --- */}}
            {{- range .Values.listenAddrs }}
            - --listen-addr={{ include "k8s-httpcache.tpl" (dict "value" . "ctx" $) }}
            {{- end }}
            {{- /* --- Backends (repeatable) --- */}}
            {{- range .Values.backends }}
            - --backend={{ include "k8s-httpcache.tpl" (dict "value" .name "ctx" $) }}:{{ include "k8s-httpcache.tpl" (dict "value" .service "ctx" $) }}{{ if .port }}:{{ include "k8s-httpcache.tpl" (dict "value" (toString .port) "ctx" $) }}{{ end }}
            {{- end }}
            {{- /* --- Backend discovery (repeatable) --- */}}
            {{- range .Values.backendDiscovery }}
            {{- $parts := list }}
            {{- range $k, $v := .selector }}
            {{- $parts = append $parts (printf "%s=%s" $k (include "k8s-httpcache.tpl" (dict "value" (toString $v) "ctx" $))) }}
            {{- end }}
            {{- $sel := join "," $parts }}
            - --backend-selector={{ if .allNamespaces }}*//{{ else if .namespace }}{{ include "k8s-httpcache.tpl" (dict "value" .namespace "ctx" $) }}//{{ end }}{{ $sel }}{{ if .port }}:{{ include "k8s-httpcache.tpl" (dict "value" (toString .port) "ctx" $) }}{{ end }}
            {{- end }}
            {{- /* --- Values (repeatable) --- */}}
            {{- range .Values.values }}
            - --values={{ include "k8s-httpcache.tpl" (dict "value" .name "ctx" $) }}:{{ include "k8s-httpcache.tpl" (dict "value" .configmap "ctx" $) }}
            {{- end }}
            {{- /* --- Secrets (repeatable) --- */}}
            {{- range .Values.secrets }}
            - --secrets={{ include "k8s-httpcache.tpl" (dict "value" .name "ctx" $) }}:{{ include "k8s-httpcache.tpl" (dict "value" .secret "ctx" $) }}
            {{- end }}
            {{- /* --- TLS certificates (repeatable) --- */}}
            {{- range .Values.tlsCerts }}
            - --tls-cert={{ include "k8s-httpcache.tpl" (dict "value" .name "ctx" $) }}:{{ include "k8s-httpcache.tpl" (dict "value" .secret "ctx" $) }}
            {{- end }}
            {{- /* --- Values dirs (repeatable) --- */}}
            {{- range .Values.valuesDirs }}
            - --values-dir={{ include "k8s-httpcache.tpl" (dict "value" .name "ctx" $) }}:{{ include "k8s-httpcache.tpl" (dict "value" .path "ctx" $) }}
            {{- end }}
            {{- with .Values.valuesDirPollInterval }}
            - --values-dir-poll-interval={{ . }}
            {{- end }}
            {{- if ne (toString .Values.valuesDirWatch) "" }}
            - --values-dir-watch={{ .Values.valuesDirWatch }}
            {{- end }}
            {{- /* --- Exclude annotations (repeatable) --- */}}
            {{- range .Values.excludeAnnotations }}
            - --exclude-annotations={{ include "k8s-httpcache.tpl" (dict "value" . "ctx" $) }}
            {{- end }}
            {{- /* --- Broadcast --- */}}
            {{- if .Values.broadcast.enabled }}
            {{- with .Values.broadcast.addr }}
            - --broadcast-addr={{ . }}
            {{- end }}
            {{- with .Values.broadcast.targetListenAddr }}
            - --broadcast-target-listen-addr={{ . }}
            {{- end }}
            {{- with .Values.broadcast.drainTimeout }}
            - --broadcast-drain-timeout={{ . }}
            {{- end }}
            {{- with .Values.broadcast.shutdownTimeout }}
            - --broadcast-shutdown-timeout={{ . }}
            {{- end }}
            {{- with .Values.broadcast.serverIdleTimeout }}
            - --broadcast-server-idle-timeout={{ . }}
            {{- end }}
            {{- with .Values.broadcast.readHeaderTimeout }}
            - --broadcast-read-header-timeout={{ . }}
            {{- end }}
            {{- with .Values.broadcast.readTimeout }}
            - --broadcast-read-timeout={{ . }}
            {{- end }}
            {{- with .Values.broadcast.writeTimeout }}
            - --broadcast-write-timeout={{ . }}
            {{- end }}
            {{- with .Values.broadcast.clientIdleTimeout }}
            - --broadcast-client-idle-timeout={{ . }}
            {{- end }}
            {{- with .Values.broadcast.clientTimeout }}
            - --broadcast-client-timeout={{ . }}
            {{- end }}
            {{- else }}
            - --broadcast-addr=none
            {{- end }}
            {{- /* --- Metrics --- */}}
            {{- if .Values.metrics.enabled }}
            {{- with .Values.metrics.addr }}
            - --metrics-addr={{ . }}
            {{- end }}
            {{- with .Values.metrics.readHeaderTimeout }}
            - --metrics-read-header-timeout={{ . }}
            {{- end }}
            {{- with .Values.metrics.readTimeout }}
            - --metrics-read-timeout={{ . }}
            {{- end }}
            {{- with .Values.metrics.writeTimeout }}
            - --metrics-write-timeout={{ . }}
            {{- end }}
            {{- with .Values.metrics.idleTimeout }}
            - --metrics-idle-timeout={{ . }}
            {{- end }}
            {{- if .Values.metrics.varnishstatExport }}
            - --varnishstat-export
            {{- with .Values.metrics.varnishstatExportFilter }}
            - --varnishstat-export-filter={{ . }}
            {{- end }}
            {{- end }}
            {{- else }}
            - --metrics-addr=none
            {{- end }}
            {{- /* --- Varnishncsa --- */}}
            {{- if .Values.varnishncsa.enabled }}
            - --varnishncsa-enabled
            {{- with .Values.varnishncsa.path }}
            - --varnishncsa-path={{ . }}
            {{- end }}
            {{- with .Values.varnishncsa.format }}
            - --varnishncsa-format={{ . }}
            {{- end }}
            {{- with .Values.varnishncsa.query }}
            - --varnishncsa-query={{ . }}
            {{- end }}
            {{- if .Values.varnishncsa.backend }}
            - --varnishncsa-backend
            {{- end }}
            {{- with .Values.varnishncsa.output }}
            - --varnishncsa-output={{ . }}
            {{- end }}
            {{- with .Values.varnishncsa.prefix }}
            - --varnishncsa-prefix={{ . }}
            {{- end }}
            {{- end }}
            {{- /* --- Drain --- */}}
            {{- if .Values.drain.enabled }}
            - --drain
            {{- with .Values.drain.delay }}
            - --drain-delay={{ . }}
            {{- end }}
            {{- with .Values.drain.pollInterval }}
            - --drain-poll-interval={{ . }}
            {{- end }}
            {{- with .Values.drain.timeout }}
            - --drain-timeout={{ . }}
            {{- end }}
            {{- end }}
            {{- /* --- Template --- */}}
            {{- with .Values.template.delims }}
            - --template-delims={{ . }}
            {{- end }}
            {{- with .Values.template.funcs }}
            - --template-funcs={{ . }}
            {{- end }}
            {{- with .Values.template.zone }}
            - --zone={{ . }}
            {{- end }}
            {{- /* --- Debounce --- */}}
            {{- with .Values.debounce.duration }}
            - --debounce={{ . }}
            {{- end }}
            {{- with .Values.debounce.max }}
            - --debounce-max={{ . }}
            {{- end }}
            {{- with .Values.debounce.frontendDuration }}
            - --frontend-debounce={{ . }}
            {{- end }}
            {{- with .Values.debounce.frontendMax }}
            - --frontend-debounce-max={{ . }}
            {{- end }}
            {{- with .Values.debounce.backendDuration }}
            - --backend-debounce={{ . }}
            {{- end }}
            {{- with .Values.debounce.backendMax }}
            - --backend-debounce-max={{ . }}
            {{- end }}
            {{- with .Values.debounce.tlsCertDuration }}
            - --tls-cert-debounce={{ . }}
            {{- end }}
            {{- with .Values.debounce.tlsCertMax }}
            - --tls-cert-debounce-max={{ . }}
            {{- end }}
            {{- with .Values.debounce.latencyBuckets }}
            - --debounce-latency-buckets={{ . }}
            {{- end }}
            {{- /* --- Logging --- */}}
            {{- with .Values.logging.level }}
            - --log-level={{ . }}
            {{- end }}
            {{- with .Values.logging.format }}
            - --log-format={{ . }}
            {{- end }}
            {{- /* --- VCL settings --- */}}
            {{- with .Values.vcl.shutdownTimeout }}
            - --shutdown-timeout={{ . }}
            {{- end }}
            {{- with .Values.vcl.templateWatchInterval }}
            - --vcl-template-watch-interval={{ . }}
            {{- end }}
            {{- if ne (toString .Values.vcl.fileWatch) "" }}
            - --file-watch={{ .Values.vcl.fileWatch }}
            {{- end }}
            {{- with .Values.vcl.reloadRetries }}
            - --vcl-reload-retries={{ . }}
            {{- end }}
            {{- with .Values.vcl.reloadRetryInterval }}
            - --vcl-reload-retry-interval={{ . }}
            {{- end }}
            {{- with .Values.vcl.kept }}
            - --vcl-kept={{ . }}
            {{- end }}
            {{- /* --- Startup / Kubernetes API timing --- */}}
            {{- with .Values.timing.startupTimeout }}
            - --startup-timeout={{ . }}
            {{- end }}
            {{- with .Values.timing.kubeApiTimeout }}
            - --kube-api-timeout={{ . }}
            {{- end }}
            {{- /* --- Extra args (before --) --- */}}
            {{- range .Values.extraArgs }}
            - {{ . }}
            {{- end }}
            {{- /* --- Varnishd extra args (after --) --- */}}
            {{- if .Values.varnishdExtraArgs }}
            - --
            {{- range .Values.varnishdExtraArgs }}
            - {{ . | quote }}
            {{- end }}
            {{- end }}
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- with .Values.extraEnv }}
            {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.container.httpPort | default 8443 }}
              protocol: TCP
            {{- if .Values.tlsCerts }}
            - name: https
              containerPort: {{ .Values.container.httpsPort | default 8443 }}
              protocol: TCP
            {{- end }}
            {{- if .Values.broadcast.enabled }}
            - name: http-b
              containerPort: {{ .Values.container.httpBroadcastPort | default 8088 }}
              protocol: TCP
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - name: http-m
              containerPort: {{ .Values.container.httpMetricsPort | default 9101 }}
              protocol: TCP
            {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.metrics.enabled }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with .Values.lifecycle }}
          lifecycle:
            {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: vcl-template
              mountPath: /etc/k8s-httpcache
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: varnish-workdir
              mountPath: /var/lib/varnish
            {{- if and .Values.staticFiles.enabled (or .Values.staticFiles.files .Values.staticFiles.existingConfigMap) }}
            - name: static-files
              mountPath: {{ .Values.staticFiles.mountPath }}
              readOnly: true
            {{- end }}
            {{- range .Values.valuesDirs }}
            - name: values-dir-{{ .name }}
              mountPath: {{ include "k8s-httpcache.tpl" (dict "value" .path "ctx" $) }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 12 }}
          {{- end }}
        {{- with .Values.extraContainers }}
        {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 8 }}
        {{- end }}
      volumes:
        - name: vcl-template
          configMap:
            name: {{ include "k8s-httpcache.fullname" . }}-vcl
        - name: tmp
          {{- if .Values.volumes.tmp.volume }}
          {{- toYaml .Values.volumes.tmp.volume | nindent 10 }}
          {{- else if or .Values.volumes.tmp.medium .Values.volumes.tmp.sizeLimit }}
          emptyDir:
            {{- with .Values.volumes.tmp.medium }}
            medium: {{ . }}
            {{- end }}
            {{- with .Values.volumes.tmp.sizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: varnish-workdir
          {{- if .Values.volumes.varnishWorkdir.volume }}
          {{- toYaml .Values.volumes.varnishWorkdir.volume | nindent 10 }}
          {{- else if or .Values.volumes.varnishWorkdir.medium .Values.volumes.varnishWorkdir.sizeLimit }}
          emptyDir:
            {{- with .Values.volumes.varnishWorkdir.medium }}
            medium: {{ . }}
            {{- end }}
            {{- with .Values.volumes.varnishWorkdir.sizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if and .Values.staticFiles.enabled (or .Values.staticFiles.files .Values.staticFiles.existingConfigMap) }}
        - name: static-files
          configMap:
            name: {{ .Values.staticFiles.existingConfigMap | default (printf "%s-static" (include "k8s-httpcache.fullname" .)) }}
        {{- end }}
        {{- range .Values.valuesDirs }}
        {{- if .configMap }}
        - name: values-dir-{{ .name }}
          configMap:
            name: {{ include "k8s-httpcache.tpl" (dict "value" .configMap "ctx" $) }}
        {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- include "k8s-httpcache.tpl" (dict "value" . "ctx" $) | nindent 8 }}
        {{- end }}
