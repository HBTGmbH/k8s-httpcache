{{- if and .Values.metrics.enabled .Values.metrics.varnishstatExport -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "k8s-httpcache.fullname" . }}-test-varnishstat
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-httpcache.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: varnishstat
      image: curlimages/curl:latest
      command: ["sh", "-c"]
      args:
        - |
          set -e
          echo "Testing /metrics contains varnish_up..."
          curl --silent --show-error --fail --max-time 5 \
            http://{{ include "k8s-httpcache.fullname" . }}:9101/metrics \
          | grep -q 'varnish_up'
          echo "varnishstat export check passed."
{{- end }}
