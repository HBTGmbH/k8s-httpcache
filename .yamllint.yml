extends: default

rules:
  line-length:
    max: 150
  # Kubernetes manifests and GitHub Actions use compact sequence style
  # (list items at the same level as the key) which the default rejects.
  indentation:
    spaces: 2
    indent-sequences: whatever
  # It is okay to omit the leading '---'.
  document-start: disable
  # GitHub Actions uses bare 'on:' which triggers a truthy warning.
  truthy:
    check-keys: false
